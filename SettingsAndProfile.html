<!DOCTYPE html>
<html>
    <head>
        <title>Setting & Profile</title>
    </head>
    <body>    
    <div class="settings-container">
    <h2>accont settings</h2>
    <form id="profile-form" action="/update-profile" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="#">
        </div>

        <div class="form-group">
            <label for="email"> Email:</label>
            <input type="email" id="email" name="user_email" placeholder="example@mail.com">
        </div>

        <div class="form-group">
            <label for="bio">about me(bio):</label>
            <textarea id="bio" name="user_bio" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label> Night mode:</label>
            <input type="checkbox" name="dark_mode">
        </div>

        <button type="submit" class="save-btn">save changes</button>
    </form>
</div>
</body>
</html>
