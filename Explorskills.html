<!DOCTYPE html>
<html>
<head>
    <title>Explor skills</title>
</head>
<body>
<div class="explore-container">
    <header>
        <h1>Discover new skills</h1>
        <form id="search-form">
            <input type="text" placeholder=" Find a skill  (for example: Python)..." name="search">
            <select name="category">
                <option value="all">All categories </option>
                <option value="programming">Programming</option>
                <option value="design">design</option>
                <option value="languages">Languages</option>
            </select>
            <button type="submit">Research</button>
        </form>
    </header>

    <section class="skills-grid">
        <div class="skill-card">
            <img src="skill-thumb.jpg" alt="Skill Image">
            <h3> Web devlopment (Frontend)</h3>
            <button class="request-btn">Request for skills exchange</button>
        </div>
        </section>
</div>
</body>
</html>
